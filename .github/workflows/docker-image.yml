name: Docker Image

on:
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "**/*.md"
      - "assets/**"
  push:
    branches: [ "main" ]
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "**/*.md"
      - "assets/**"
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: superior-kqller/wishlist-app

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify base/head commits are available
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ -n "$BASE_SHA" ] && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ]; then
            git cat-file -e "$BASE_SHA^{commit}" || {
              echo "BASE_SHA commit is not available locally: $BASE_SHA"
              exit 1
            }
            git cat-file -e "$HEAD_SHA^{commit}" || {
              echo "HEAD_SHA commit is not available locally: $HEAD_SHA"
              exit 1
            }
          fi

      - name: Verify Prisma migration exists when schema changes
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ -n "$BASE_SHA" ] && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ]; then
            npm run db:check-migrations -- --base=$BASE_SHA --head=$HEAD_SHA
          else
            echo "BASE_SHA not available (first push/tag), skipping strict diff check."
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "")
            if [ -z "$VERSION" ]; then
              SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
              VERSION="dev-${SHORT_SHA}"
            fi
          fi
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Build and (optionally) push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
