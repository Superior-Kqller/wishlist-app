services:
  wishlist-db:
    image: postgres:17-alpine
    container_name: wishlist-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: wishlist
      POSTGRES_USER: wishlist
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wishlist"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - proxy

  wishlist-valkey:
    image: valkey/valkey:8.1-alpine
    container_name: wishlist-valkey
    restart: unless-stopped
    command: >
      valkey-server
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --port 0
      --unixsocket /run/valkey/valkey.sock
      --unixsocketperm 777
    healthcheck:
      test: ["CMD", "valkey-cli", "-s", "/run/valkey/valkey.sock", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - valkey-socket:/run/valkey
    networks:
      - proxy

  wishlist-app:
    image: ghcr.io/superior-kqller/wishlist-app:latest
    container_name: wishlist-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${APP_PORT:-4030}:4030"
    depends_on:
      wishlist-db:
        condition: service_healthy
      wishlist-valkey:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://wishlist:${DB_PASSWORD}@wishlist-db:5432/wishlist
      REDIS_URL: /run/valkey/valkey.sock
    volumes:
      - uploads-data:/app/public/uploads
      - valkey-socket:/run/valkey:ro
    networks:
      - proxy

networks:
  proxy:
    name: proxy
    external: true

volumes:
  postgres-data:
  uploads-data:
  valkey-socket:
